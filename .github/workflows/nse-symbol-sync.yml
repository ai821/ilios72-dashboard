name: NSE Symbol Master Sync

# Runs weekly (new listings/delistings don't happen daily), and can be
# triggered manually from the Actions tab for testing.
on:
  schedule:
    - cron: "0 5 * * 1"   # 05:00 UTC every Monday
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run NSE symbol sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python nse_symbol_sync.py
