<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>ILIOS 72 — Reset Password</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#0D0D0D; --card:#161616; --border:#2A2A2A;
  --text:#F0F0F0; --dim:#A0A0A0; --muted:#666;
  --orange:#E8731A; --orange2:#FF8C38; --orangeBg:rgba(232,115,26,0.08);
  --green:#22C55E; --red:#EF4444; --blue:#3B82F6;
  --font:'Inter',sans-serif; --mono:'JetBrains Mono',monospace;
}
body { font-family:var(--font); background:var(--bg); color:var(--text);
  min-height:100vh; display:flex; align-items:center; justify-content:center; }

.wrap { width:100%; max-width:420px; padding:24px; }

.logo { text-align:center; margin-bottom:40px; }
.logo-name { font-size:28px; font-weight:800; letter-spacing:3px; color:var(--text); }
.logo-sub  { font-size:11px; color:var(--muted); letter-spacing:.15em; margin-top:4px; }
.logo-bar  { width:40px; height:3px; background:var(--orange); margin:12px auto 0; border-radius:2px; }

.card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:32px; }
.card-title { font-size:15px; font-weight:700; margin-bottom:6px; }
.card-sub   { font-size:12px; color:var(--muted); margin-bottom:28px; }

.field { margin-bottom:16px; }
.field label { display:block; font-size:11px; font-weight:600; color:var(--dim);
  text-transform:uppercase; letter-spacing:.08em; margin-bottom:6px; }
.field input { width:100%; padding:11px 14px; background:#1E1E1E; border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-size:13px; font-family:var(--font); outline:none;
  transition:border-color .2s; }
.field input:focus { border-color:var(--orange); }

.btn-primary { width:100%; padding:13px; background:var(--orange); color:#fff; border:none;
  border-radius:8px; font-size:14px; font-weight:700; cursor:pointer; font-family:var(--font);
  transition:background .2s; margin-top:4px; }
.btn-primary:hover { background:var(--orange2); }
.btn-primary:disabled { opacity:.5; cursor:not-allowed; }

.btn-secondary { width:100%; padding:11px; background:transparent; color:var(--dim);
  border:1px solid var(--border); border-radius:8px; font-size:13px; font-weight:500;
  cursor:pointer; font-family:var(--font); transition:all .2s; margin-top:12px; text-decoration:none;
  display:block; text-align:center; }
.btn-secondary:hover { border-color:var(--orange); color:var(--orange); }

.error-msg { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3);
  border-radius:8px; padding:10px 14px; font-size:12px; color:var(--red);
  margin-bottom:16px; display:none; }
.error-msg.show { display:block; }

.success-msg { background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.3);
  border-radius:8px; padding:10px 14px; font-size:12px; color:var(--green);
  margin-bottom:16px; display:none; }
.success-msg.show { display:block; }

.footer-note { text-align:center; margin-top:24px; font-size:11px; color:var(--muted); }

.loading-spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,0.3);
  border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; margin-right:8px; }
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-name">ILIOS 72</div>
    <div class="logo-sub">Alternative Capital</div>
    <div class="logo-bar"></div>
  </div>

  <!-- Valid recovery link: show the set-new-password form -->
  <div class="card" id="resetCard" style="display:none">
    <div class="card-title">Set a new password</div>
    <div class="card-sub">Choose a new password for your account.</div>

    <div class="error-msg" id="resetError"></div>
    <div class="success-msg" id="resetSuccess"></div>

    <div class="field">
      <label>New Password</label>
      <input type="password" id="newPassword" placeholder="Min 6 characters" autocomplete="new-password">
    </div>
    <div class="field">
      <label>Confirm New Password</label>
      <input type="password" id="confirmPassword" placeholder="Re-enter password" autocomplete="new-password">
    </div>
    <button class="btn-primary" id="resetBtn" onclick="doReset()">Update Password</button>
  </div>

  <!-- Invalid / expired / missing token -->
  <div class="card" id="invalidCard" style="display:none">
    <div class="card-title">Reset link invalid or expired</div>
    <div class="card-sub" id="invalidReason">
      This password reset link is no longer valid. Reset links only work once and expire after a short time.
    </div>
    <a class="btn-secondary" href="index.html">Back to sign in</a>
  </div>

  <!-- Loading -->
  <div class="card" id="checkingCard">
    <div class="card-sub" style="margin-bottom:0"><span class="loading-spinner"></span>Checking your reset link…</div>
  </div>

  <div class="footer-note">
    ILIOS 72 Alternative Capital &copy; 2025
  </div>
</div>

<script src="supabase.js"></script>
<script>
let recoveryAccessToken = null;

// Supabase sends the recovery token back as a URL fragment, e.g.:
// #access_token=...&refresh_token=...&type=recovery&expires_in=3600
// Some configurations may instead put it in the query string, so check both.
function getRecoveryParams() {
  const hash = window.location.hash.startsWith('#') ? window.location.hash.slice(1) : window.location.hash;
  const hashParams  = new URLSearchParams(hash);
  const queryParams = new URLSearchParams(window.location.search);
  return {
    access_token: hashParams.get('access_token') || queryParams.get('access_token'),
    type:         hashParams.get('type') || queryParams.get('type'),
    error:        hashParams.get('error_description') || queryParams.get('error_description')
  };
}

(function init() {
  const { access_token, type, error } = getRecoveryParams();
  document.getElementById('checkingCard').style.display = 'none';

  if (error) {
    document.getElementById('invalidReason').textContent = decodeURIComponent(error.replace(/\+/g, ' '));
    document.getElementById('invalidCard').style.display = 'block';
    return;
  }

  if (!access_token || type !== 'recovery') {
    document.getElementById('invalidCard').style.display = 'block';
    return;
  }

  recoveryAccessToken = access_token;
  document.getElementById('resetCard').style.display = 'block';
})();

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.classList.add('show');
}
function clearMsgs(prefix) {
  document.getElementById(prefix+'Error').classList.remove('show');
  document.getElementById(prefix+'Success').classList.remove('show');
}

async function doReset() {
  clearMsgs('reset');
  const pw  = document.getElementById('newPassword').value;
  const pw2 = document.getElementById('confirmPassword').value;

  if (!pw || !pw2) { showError('resetError', 'Please fill in both fields'); return; }
  if (pw.length < 6) { showError('resetError', 'Password must be at least 6 characters'); return; }
  if (pw !== pw2) { showError('resetError', 'Passwords do not match'); return; }

  const btn = document.getElementById('resetBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spinner"></span>Updating...';

  try {
    await sb.updatePasswordWithRecoveryToken(recoveryAccessToken, pw);
    document.getElementById('resetSuccess').textContent =
      'Password updated! Redirecting you to sign in...';
    document.getElementById('resetSuccess').classList.add('show');
    btn.style.display = 'none';
    setTimeout(() => { window.location.href = 'index.html'; }, 2000);
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = 'Update Password';
    showError('resetError', e.message);
  }
}
</script>
</body>
</html>
